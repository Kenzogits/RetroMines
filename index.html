<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroMines | Game Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --win-gray: #C0C0C0;
            --win-blue: #000080;
            --border-light: #FFFFFF;
            --border-dark: #808080;
            --grid-bg: #bdbdbd;
            --num-1: #0000FF;
            --num-2: #008000;
            --num-3: #FF0000;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', cursive;
            background-color: var(--grid-bg);
            background-image: 
                linear-gradient(var(--border-dark) 2px, transparent 2px),
                linear-gradient(90deg, var(--border-dark) 2px, transparent 2px),
                linear-gradient(var(--border-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative;
            overflow: hidden;
        }


        .window {
            position: relative;
            z-index: 10;
            background-color: var(--win-gray);
            border: 4px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 520px;
            padding: 4px;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }

        .content {
            padding: 25px;
            text-align: center;
        }

        .status-bar {
            background: #000;
            border: 3px inset #fff;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 20px;
            color: #FF0000;
            font-size: 18px;
        }

        .game-header {
            margin-bottom: 25px;
        }

        .game-title {
            color: #000;
            font-size: 22px;
            margin: 0;
            text-decoration: underline;
        }

        .menu-list {
            display: grid;
            gap: 15px;
        }

        .btn {
            background-color: var(--win-gray);
            border: 4px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            padding: 18px;
            color: #000;
            text-decoration: none;
            font-size: 10px;
            display: block;
            position: relative;
        }

        .btn:active {
            border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
            transform: translate(2px, 2px);
        }

        .btn.github {
            background-color: #00FF00;
        }

        .lang-info {
            margin-top: 30px;
            font-size: 8px;
            color: #404040;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-bar-text">RETROMINES_SYSTEM</div>
        <div class="title-bar-controls">
<span style="border:1px solid #fff; padding: 0 4px;">?</span>
            <span style="border:1px solid #fff; padding: 0 4px;">X</span>
        </div>
    </div>

    <div class="content">
        <div class="status-bar">
            <div title="Mines Remaining">008</div>
            <div title="Status">🙂</div>
            <div title="Time Elapsed">059</div>
        </div>

        <div class="game-header">
            <h1 class="game-title">RETROMINES</h1>
            <p style="font-size: 8px; color: #555; margin-top: 10px;">com.seeker.retromines</p>
        </div>

        <nav class="menu-list">
            <a href="https://github.com/kenzogits/RetroMines" class="btn github">OPEN GITHUB SOURCE</a>
            
            <a href="https://kenzogits.github.io/RetroMines/EULA" class="btn">EULA_AGREEMENT(EULA)</a>
            <a href="https://kenzogits.github.io/RetroMines/TOS" class="btn">TERMS_OF_SERVICE(TOS)</a>
            <a href="https://kenzogits.github.io/RetroMines/LEGAL" class="btn">LEGAL_COMPLIANCE</a>
            <a href="https://kenzogits.github.io/RetroMines/PRIVACY" class="btn">PRIVACY_POLICY</a>
        </nav>

        <div class="lang-info">
            © 2026 RetroMines Development Team. ALL RIGHTS RESERVED.
        </div>
    </div>
</div>

</body>
</html>
