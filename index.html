
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroMines | Official Portal</title>
    <!-- 引入复古像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --primary-green: #00FF00;
            --accent-red: #FF0000;
            --border-gray: #808080;
            --text-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-green);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
        }

        /* 游戏窗口容器 */
        .window {
            border: 4px solid var(--border-gray);
            background-color: #C0C0C0;
            padding: 20px;
            box-shadow: 8px 8px 0px #404040;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 5px;
            margin-bottom: 20px;
            color: white;
            font-size: 14px;
            text-align: left;
        }

        h1 {
            color: #000;
            font-size: 24px;
            margin: 20px 0;
            text-shadow: 2px 2px #fff;
        }

        .logo-box {
            background-color: #000;
            padding: 15px;
            border: 2px inset #fff;
            margin-bottom: 30px;
        }

        /* 链接按钮样式 */
        .nav-links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            background-color: #C0C0C0;
            border: 4px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 15px;
            color: #000;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.1s;
            cursor: pointer;
            display: block;
        }

        .btn:active {
            border-color: #808080 #fff #fff #808080;
            transform: translate(2px, 2px);
        }

        .btn.github {
            background-color: var(--primary-green);
            color: #000;
        }

        .footer {
            margin-top: 30px;
            font-size: 8px;
            color: #404040;
        }

        .lang-hint {
            font-size: 10px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="header">RETROMINES_SYSTEM.EXE</div>
        
        <div class="logo-box">
            <h1 style="color: #00FF00; text-shadow: none;">RETROMINES</h1>
            <p style="color: #FFF; font-size: 10px;">Com.crypto.retromines</p>
        </div>

        <div class="nav-links">
            <!-- 直接进入 GitHub 的主按钮 -->
            <a href="https://github.com/你的用户名/RetroMines" class="btn github">GO TO GITHUB REPOSITORY</a>
            
            <hr style="border: 1px dashed #808080; width: 100%;">
            
            <!-- 其他四个合规链接 -->
            <a href="./eula.html" class="btn">END USER LICENSE (EULA)</a>
            <a href="./tos.html" class="btn">TERMS OF SERVICE (TOS)</a>
            <a href="./legal.html" class="btn">LEGAL DECLARATION</a>
            <a href="./privacy.html" class="btn">PRIVACY POLICY</a>
        </div>

        <div class="lang-hint">
            Priority: 1. English ... 8. 简体中文
        </div>

        <div class="footer">
            &copy; 2026 RETROMINES DEV TEAM. ALL RIGHTS RESERVED.
        </div>
    </div>

</body>
</html>
